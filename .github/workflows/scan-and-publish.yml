name: Scan And Publish Reports

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      issue_url:
        description: GitHub issue URL to scan, or plain issue number (e.g. 42)
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: scan-repository
  cancel-in-progress: false

jobs:
  scan-and-publish:
    # For workflow_dispatch, only run when an issue_url was supplied.
    # For issue events, only run when the title starts with "SCAN:"
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.issue_url != '') ||
      (github.event_name == 'issues' && startsWith(github.event.issue.title, 'SCAN:'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Eco CI energy measurement for this CI run ─────────────────────────
      - name: Start CI energy measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
          send-data: false
        continue-on-error: true

      - name: Capture install energy lap
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'Install dependencies'
        continue-on-error: true

      - name: Resolve issue context
        id: ctx
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "issue_url=${{ github.server_url }}/${{ github.repository }}/issues/${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            INPUT_ISSUE_URL="${{ inputs.issue_url }}"

            # If issue_url is a plain number, expand it to a full URL
            if [[ "$INPUT_ISSUE_URL" =~ ^[0-9]+$ ]]; then
              PLAIN_NUM="$INPUT_ISSUE_URL"
              INPUT_ISSUE_URL="https://github.com/${{ github.repository }}/issues/$PLAIN_NUM"
            fi

            # Parse issue_number from the URL
            ISSUE_NUMBER=$(echo "$INPUT_ISSUE_URL" | sed -E 's|.*/issues/([0-9]+).*|\1|')

            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "issue_url=$INPUT_ISSUE_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scan
        if: steps.ctx.outputs.issue_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .tmp/current-report
          npm run scan -- \
            --issue-url "${{ steps.ctx.outputs.issue_url }}" \
            --issue-number "${{ steps.ctx.outputs.issue_number }}" \
            --output ./.tmp/current-report

      - name: Capture scan energy lap
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'Sustainability scan'
        continue-on-error: true

      - name: Prepare pages site
        if: steps.ctx.outputs.issue_url
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p .tmp/site
          if [ -d ./reports ] || [ -f ./reports.html ]; then
            cp -R ./reports ./.tmp/site/ 2>/dev/null || true
            cp ./reports.html ./.tmp/site/reports.html 2>/dev/null || true
            cp ./index.html ./.tmp/site/index.html 2>/dev/null || true
            cp ./.nojekyll ./.tmp/site/.nojekyll 2>/dev/null || true
          fi

          node src/report/build-pages-site.js \
            --site-dir ./.tmp/site \
            --report-dir ./.tmp/current-report \
            --issue-number "${{ steps.ctx.outputs.issue_number }}" \
            --run-id "$RUN_ID" \
            --repo "$REPO" \
            --metadata-out ./.tmp/report-metadata.json

      - name: Commit published pages content to main
        if: steps.ctx.outputs.issue_url
        run: |
          rm -rf ./reports
          mkdir -p ./reports
          cp -R ./.tmp/site/reports/. ./reports/
          cp ./.tmp/site/reports.html ./reports.html
          cp ./.tmp/site/index.html ./index.html
          cp ./.tmp/site/.nojekyll ./.nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports reports.html index.html .nojekyll

          if git diff --cached --quiet; then
            echo "No pages changes to commit"
          else
            git commit -m "Publish sustainability reports for issue #${{ steps.ctx.outputs.issue_number }}"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Post issue comment with report links
        if: steps.ctx.outputs.issue_number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue_number }}
          REPORT_METADATA_PATH: ./.tmp/report-metadata.json
        run: node src/report/post-issue-comment.js

      - name: Close issue after successful scan
        if: steps.ctx.outputs.issue_number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close "${{ steps.ctx.outputs.issue_number }}" \
            -R "${{ github.repository }}" \
            || echo "WARNING: Failed to close issue #${{ steps.ctx.outputs.issue_number }}"

      # ── Show Eco CI energy totals for this CI run ─────────────────────────
      - name: Display CI energy results
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          json-output: true
          send-data: false
        continue-on-error: true
